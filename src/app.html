<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Favicon -->
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="alternate icon" href="/apple-touch-icon.png" type="image/png" />

		<!-- iOS / Add to Home Screen -->
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="GitInsight" />

		<!-- Theme color (browser chrome on Android + Safari) -->
		<meta name="theme-color" content="#0a0a0a" />

		<!-- Web App Manifest (Android + modern browsers) -->
		<link rel="manifest" href="/manifest.json" />

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
